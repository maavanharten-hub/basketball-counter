<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
                
    </head>
    <style>
                            @import url('https://fonts.cdnfonts.com/css/cursed-timer-ulil');
    </style>
                
    <body>
        <div class="container">
            <div>
                <h3 class="title">HOME</h3>
                <h1 id="count-home" class="box">0</h1>
                <button id="home1-btn" onclick="addHome1()">+1</button>
                <button id="home2-btn" onclick="addHome2()">+2</button>
                <button id="home3-btn" onclick="addHome3()">+3</button>
            </div>
            <div>
                <h3 class="title">GUEST</h3>
                <h1 id="count-guest" class="box">0</h1>
                 <button id="guest1-btn" onclick="addGuest1()">+1</button>
                <button id="guest2-btn" onclick="addGuest2()">+2</button>
                <button id="guest3-btn" onclick="addGuest3()">+3</button>
            </div>
        </div>
        <div>
            <button id="new-game-btn" class="newgamebtn" onclick="newGame()">NEW GAME</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
